name: Quiz CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — Build (GitHub Actions, ubuntu runner)
  # ─────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run tests
        run: npm test -- --watchAll=false
        continue-on-error: true

      - name: Build project
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: quiz-build
          path: build

  # ─────────────────────────────────────────────
  # JOB 2 — Trigger Jenkins pipeline after build
  # ─────────────────────────────────────────────
  trigger-jenkins:
    runs-on: ubuntu-latest
    needs: build                          # ✅ Only runs after build succeeds

    steps:
      - name: Validate Jenkins secrets
        run: |
          MISSING=""
          [ -z "${{ secrets.JENKINS_URL }}"       ] && MISSING="$MISSING JENKINS_URL"
          [ -z "${{ secrets.JENKINS_USER }}"      ] && MISSING="$MISSING JENKINS_USER"
          [ -z "${{ secrets.JENKINS_API_TOKEN }}" ] && MISSING="$MISSING JENKINS_API_TOKEN"
          [ -z "${{ secrets.JENKINS_JOB_TOKEN }}" ] && MISSING="$MISSING JENKINS_JOB_TOKEN"

          if [ -n "$MISSING" ]; then
            echo "❌ Missing required GitHub secrets:$MISSING"
            echo ""
            echo "👉 Go to: Settings → Secrets and variables → Actions → New repository secret"
            echo "   JENKINS_URL        → e.g. http://your-jenkins-host:8080  (no trailing slash)"
            echo "   JENKINS_USER       → your Jenkins username"
            echo "   JENKINS_API_TOKEN  → Jenkins user API token"
            echo "   JENKINS_JOB_TOKEN  → token set in the Jenkins job's 'Trigger builds remotely'"
            exit 1
          fi

          # Strip trailing slash to prevent double-slash in URLs
          JENKINS_URL="${{ secrets.JENKINS_URL }}"
          JENKINS_URL="${JENKINS_URL%/}"
          echo "✅ All secrets present. Jenkins URL: $JENKINS_URL"

      - name: Trigger Jenkins deploy job
        run: |
          JENKINS_URL="${{ secrets.JENKINS_URL }}"
          JENKINS_URL="${JENKINS_URL%/}"   # strip trailing slash

          echo "🚀 Triggering Jenkins job at: $JENKINS_URL/job/quiz-app-deploy/build"

          HTTP_STATUS=$(curl \
            --silent \
            --output response.txt \
            --write-out "%{http_code}" \
            --connect-timeout 15 \
            --max-time 30 \
            --user "${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_API_TOKEN }}" \
            --data "token=${{ secrets.JENKINS_JOB_TOKEN }}" \
            "$JENKINS_URL/job/quiz-app-deploy/build?token=${{ secrets.JENKINS_JOB_TOKEN }}")

          CURL_EXIT=$?

          # Diagnose curl-level failures (exit code 3 = bad URL, 6 = can't resolve host, 7 = connection refused)
          if [ $CURL_EXIT -ne 0 ]; then
            echo "❌ curl failed with exit code $CURL_EXIT"
            case $CURL_EXIT in
              3)  echo "   → URL is malformed. Check JENKINS_URL secret (e.g. http://host:8080, no trailing slash)." ;;
              6)  echo "   → Could not resolve host. Verify JENKINS_URL points to a reachable hostname/IP." ;;
              7)  echo "   → Connection refused. Jenkins may be down or the port is wrong." ;;
              28) echo "   → Connection timed out. Jenkins host is unreachable from GitHub Actions." ;;
              *)  echo "   → See https://curl.se/libcurl/c/libcurl-errors.html for code $CURL_EXIT" ;;
            esac
            exit 1
          fi

          echo "Jenkins responded with HTTP $HTTP_STATUS"

          if [ "$HTTP_STATUS" != "201" ] && [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Jenkins trigger failed (HTTP $HTTP_STATUS)"
            echo "Response body:"
            cat response.txt
            if [ "$HTTP_STATUS" = "403" ]; then
              echo "   → 403 Forbidden: check JENKINS_USER / JENKINS_API_TOKEN, and that the job token matches."
            elif [ "$HTTP_STATUS" = "404" ]; then
              echo "   → 404 Not Found: confirm the job is named exactly 'quiz-app-deploy' in Jenkins."
            fi
            exit 1
          fi

          echo "✅ Jenkins job triggered successfully"

      - name: Poll Jenkins for build result
        run: |
          JENKINS_URL="${{ secrets.JENKINS_URL }}"
          JENKINS_URL="${JENKINS_URL%/}"   # strip trailing slash

          # Wait for Jenkins to queue and start the job
          echo "⏳ Waiting 15 s for Jenkins to queue the job..."
          sleep 15

          JENKINS_BASE="$JENKINS_URL/job/quiz-app-deploy"
          AUTH="${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_API_TOKEN }}"

          # Get last build number
          BUILD_NUMBER=$(curl -sf --user "$AUTH" \
            "$JENKINS_BASE/lastBuild/buildNumber" 2>/dev/null)

          if [ -z "$BUILD_NUMBER" ]; then
            echo "❌ Could not retrieve build number from Jenkins. Is the job name correct?"
            exit 1
          fi

          echo "Polling Jenkins build #$BUILD_NUMBER ..."

          # Poll every 15 s, up to 20 times (≈ 5 minutes)
          for i in $(seq 1 20); do
            RESULT=$(curl -sf --user "$AUTH" \
              "$JENKINS_BASE/$BUILD_NUMBER/api/json?tree=result,building" 2>/dev/null \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('result') or ('BUILDING' if d.get('building') else 'UNKNOWN'))" 2>/dev/null \
              || echo "UNKNOWN")

            echo "Attempt $i/20: $RESULT"

            if [ "$RESULT" = "SUCCESS" ]; then
              echo "✅ Jenkins build succeeded"
              exit 0
            elif [ "$RESULT" = "FAILURE" ] || [ "$RESULT" = "ABORTED" ] || [ "$RESULT" = "UNSTABLE" ]; then
              echo "❌ Jenkins build $RESULT"
              exit 1
            fi

            sleep 15
          done

          echo "⚠️  Timed out waiting for Jenkins result after 5 minutes"
          exit 1

  # ─────────────────────────────────────────────
  # JOB 3 — Deploy (self-hosted Windows runner)
  #         Runs only when Jenkins reports success
  # ─────────────────────────────────────────────
  deploy:
    runs-on: self-hosted
    needs: trigger-jenkins                # ✅ Waits for Jenkins to pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clean old build folder
        shell: powershell
        run: |
          if (Test-Path build) {
            Remove-Item -Recurse -Force build
            echo "Old build folder removed"
          } else {
            echo "No old build folder found"
          }

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: quiz-build
          path: build

      - name: Verify build folder
        shell: powershell
        run: |
          echo "Build folder contents:"
          ls build
          echo "index.html content preview:"
          Get-Content build/index.html -TotalCount 5

      - name: Stop and remove old container
        shell: powershell
        continue-on-error: true
        run: |
          docker stop quiz-app-container
          docker rm quiz-app-container
          docker rmi quiz-app

      - name: Build new Docker image
        shell: powershell
        run: docker build --no-cache -t quiz-app .

      - name: Run new container
        shell: powershell
        run: docker run -d -p 3001:80 --name quiz-app-container quiz-app

      - name: Verify container is running
        shell: powershell
        run: docker ps | findstr quiz-app-container

  # ─────────────────────────────────────────────
  # JOB 4 — Jenkins Pipeline (quiz-app-deploy)
  #         Mirrors the Jenkinsfile stages inline
  # ─────────────────────────────────────────────
  jenkins-pipeline:
    runs-on: ubuntu-latest
    needs: trigger-jenkins                # ✅ Runs alongside deploy, after Jenkins succeeds

    env:
      APP_NAME: quiz-app
      CONTAINER_NAME: quiz-app-container
      HOST_PORT: "3001"
      CONTAINER_PORT: "80"

    steps:
      # ── Stage 1: Checkout ──────────────────────
      - name: "[Jenkins] Checkout"
        uses: actions/checkout@v4

      # ── Stage 2: Install Dependencies ──────────
      - name: "[Jenkins] Install Dependencies"
        run: |
          echo "📦 Installing npm dependencies..."
          npm install --legacy-peer-deps

      # ── Stage 3: Run Tests ─────────────────────
      - name: "[Jenkins] Run Tests"
        run: |
          echo "🧪 Running tests..."
          npm test -- --watchAll=false --passWithNoTests || true

      # ── Stage 4: Build React App ───────────────
      - name: "[Jenkins] Build"
        run: |
          echo "🏗️ Building React app..."
          npm run build
          echo "✅ Build complete. Contents of build/:"
          ls -lh build/

      # ── Stage 5: Build Docker Image ────────────
      - name: "[Jenkins] Build Docker Image"
        run: |
          echo "🐳 Building Docker image: $APP_NAME..."
          docker build --no-cache -t $APP_NAME .
          echo "✅ Docker image built successfully."

      # ── Stage 6: Remove Old Container ──────────
      - name: "[Jenkins] Remove Old Container"
        run: |
          echo "🛑 Stopping and removing old container: $CONTAINER_NAME..."
          docker stop $CONTAINER_NAME || true
          docker rm   $CONTAINER_NAME || true
          echo "Old container cleaned up."

      # ── Stage 7: Deploy New Container ──────────
      - name: "[Jenkins] Deploy"
        run: |
          echo "🚀 Starting new container on port $HOST_PORT..."
          docker run -d \
            -p $HOST_PORT:$CONTAINER_PORT \
            --name $CONTAINER_NAME \
            --restart unless-stopped \
            $APP_NAME
          echo "✅ Container $CONTAINER_NAME is running."

      # ── Stage 8: Health Check ──────────────────
      - name: "[Jenkins] Health Check"
        run: |
          echo "🩺 Verifying container is healthy..."
          sleep 5
          docker ps --filter name=$CONTAINER_NAME \
            --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'
          STATUS=$(docker inspect -f '{{.State.Status}}' $CONTAINER_NAME)
          echo "Container status: $STATUS"
          if [ "$STATUS" != "running" ]; then
            echo "❌ Container is NOT running!"
            docker logs $CONTAINER_NAME
            exit 1
          fi
          echo "✅ Health check passed."

      # ── Post: Cleanup dangling images ──────────
      - name: "[Jenkins] Post — Cleanup"
        if: always()
        run: |
          echo "🧹 Pruning dangling Docker images..."
          docker image prune -f || true
          echo "📋 Pipeline finished with status: ${{ job.status }}"
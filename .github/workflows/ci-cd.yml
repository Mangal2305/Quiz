name: Quiz CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run tests
        run: npm test -- --watchAll=false
        continue-on-error: true

      - name: Build project
        run: npm run build

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: quiz-build
          path: build

  deploy:
    runs-on: self-hosted
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clean old build folder        # ✅ Remove stale build first
        shell: powershell
        run: |
          if (Test-Path build) {
            Remove-Item -Recurse -Force build
            echo "Old build folder removed"
          } else {
            echo "No old build folder found"
          }

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: quiz-build
          path: build                        # ✅ Fresh artifact placed here

      - name: Verify build folder           # ✅ Confirm files are correct
        shell: powershell
        run: |
          echo "Build folder contents:"
          ls build
          echo "index.html content preview:"
          Get-Content build/index.html -TotalCount 5

      - name: Stop and remove old container
        shell: powershell
        continue-on-error: true
        run: |
          docker stop quiz-app-container
          docker rm quiz-app-container
          docker rmi quiz-app

      - name: Build new Docker image
        shell: powershell
        run: docker build --no-cache -t quiz-app .

      - name: Run new container
        shell: powershell
        run: docker run -d -p 3001:80 --name quiz-app-container quiz-app

      - name: Verify container is running
        shell: powershell
        run: docker ps | findstr quiz-app-container
name: Quiz CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — Build React App (GitHub cloud runner)
  # ─────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run tests
        run: npm test -- --watchAll=false --passWithNoTests
        continue-on-error: true

      - name: Build project
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: quiz-build
          path: build

  # ─────────────────────────────────────────────
  # JOB 2 — Trigger Jenkins (self-hosted Windows)
  #         Uses PowerShell — no bash needed
  # ─────────────────────────────────────────────
  trigger-jenkins:
    runs-on: self-hosted
    needs: build

    steps:
      - name: Validate Jenkins secrets
        shell: powershell
        run: |
          $missing = @()
          if (-not "${{ secrets.JENKINS_USER }}")      { $missing += "JENKINS_USER" }
          if (-not "${{ secrets.JENKINS_API_TOKEN }}") { $missing += "JENKINS_API_TOKEN" }
          if (-not "${{ secrets.JENKINS_JOB_TOKEN }}") { $missing += "JENKINS_JOB_TOKEN" }

          if ($missing.Count -gt 0) {
            Write-Host "Missing GitHub secrets: $($missing -join ', ')"
            Write-Host "Go to: repo Settings > Secrets > Actions > New secret"
            exit 1
          }

          Write-Host "All secrets present. Jenkins URL: http://localhost:8080"

      - name: Trigger Jenkins deploy job
        shell: powershell
        run: |
          $jenkinsUrl  = "http://localhost:8080"
          $user        = "${{ secrets.JENKINS_USER }}"
          $apiToken    = "${{ secrets.JENKINS_API_TOKEN }}"
          $jobToken    = "${{ secrets.JENKINS_JOB_TOKEN }}"
          $base64Auth  = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("${user}:${apiToken}"))

          Write-Host "Triggering Jenkins at: $jenkinsUrl"

          try {
            $response = Invoke-WebRequest `
              -Uri "$jenkinsUrl/job/quiz-app-deploy/build?token=$jobToken" `
              -Method POST `
              -Headers @{ Authorization = "Basic $base64Auth" } `
              -Body "token=$jobToken" `
              -UseBasicParsing `
              -TimeoutSec 30

            Write-Host "Jenkins HTTP response: $($response.StatusCode)"

            if ($response.StatusCode -eq 200 -or $response.StatusCode -eq 201) {
              Write-Host "Jenkins job triggered successfully"
            } else {
              Write-Host "Unexpected status: $($response.StatusCode)"
              exit 1
            }
          } catch {
            $status = $_.Exception.Response.StatusCode.value__
            Write-Host "Jenkins trigger failed: $_"
            if ($status -eq 403) { Write-Host "403: Check JENKINS_USER and JENKINS_API_TOKEN" }
            if ($status -eq 404) { Write-Host "404: Job quiz-app-deploy not found in Jenkins" }
            if (-not $status)    { Write-Host "Connection refused. Is Jenkins running? Run: docker start jenkins" }
            exit 1
          }

      - name: Poll Jenkins for build result
        shell: powershell
        run: |
          $jenkinsUrl = "http://localhost:8080"
          $user       = "${{ secrets.JENKINS_USER }}"
          $apiToken   = "${{ secrets.JENKINS_API_TOKEN }}"
          $base64Auth = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("${user}:${apiToken}"))
          $headers    = @{ Authorization = "Basic $base64Auth" }
          $base       = "$jenkinsUrl/job/quiz-app-deploy"

          Write-Host "Waiting 15s for Jenkins to start the build..."
          Start-Sleep -Seconds 15

          try {
            $buildNumber = (Invoke-WebRequest -Uri "$base/lastBuild/buildNumber" -Headers $headers -UseBasicParsing).Content.Trim()
            Write-Host "Polling Jenkins build #$buildNumber..."
          } catch {
            Write-Host "Could not get build number. Is job named exactly quiz-app-deploy?"
            exit 1
          }

          for ($i = 1; $i -le 30; $i++) {
            try {
              $json   = (Invoke-WebRequest -Uri "$base/$buildNumber/api/json?tree=result,building" -Headers $headers -UseBasicParsing).Content
              $data   = $json | ConvertFrom-Json
              $result = if ($data.result) { $data.result } elseif ($data.building) { "BUILDING" } else { "UNKNOWN" }
            } catch {
              $result = "UNKNOWN"
            }

            Write-Host "Attempt $i/30: $result"

            if ($result -eq "SUCCESS") {
              Write-Host "Jenkins build SUCCEEDED"
              exit 0
            } elseif ($result -eq "FAILURE" -or $result -eq "ABORTED" -or $result -eq "UNSTABLE") {
              Write-Host "Jenkins build $result"
              try {
                $log = (Invoke-WebRequest -Uri "$base/$buildNumber/consoleText" -Headers $headers -UseBasicParsing).Content
                $log -split "`n" | Select-Object -Last 30 | ForEach-Object { Write-Host $_ }
              } catch {}
              exit 1
            }

            Start-Sleep -Seconds 15
          }

          Write-Host "Timed out after 7.5 minutes"
          exit 1

  # ─────────────────────────────────────────────
  # JOB 3 — Deploy quiz-app container
  # ─────────────────────────────────────────────
  deploy:
    runs-on: self-hosted
    needs: trigger-jenkins

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clean old build folder
        shell: powershell
        run: |
          if (Test-Path build) {
            Remove-Item -Recurse -Force build
            Write-Host "Old build folder removed"
          } else {
            Write-Host "No old build folder found"
          }

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: quiz-build
          path: build

      - name: Verify build folder
        shell: powershell
        run: |
          Write-Host "Build folder contents:"
          Get-ChildItem build
          Write-Host "index.html preview:"
          Get-Content build/index.html -TotalCount 5

      - name: Stop and remove old container
        shell: powershell
        continue-on-error: true
        run: |
          docker stop quiz-app-container
          docker rm   quiz-app-container
          docker rmi  quiz-app

      - name: Build new Docker image
        shell: powershell
        run: docker build --no-cache -t quiz-app .

      - name: Run new container
        shell: powershell
        run: docker run -d -p 3001:80 --name quiz-app-container --restart unless-stopped quiz-app

      - name: Verify container is running
        shell: powershell
        run: |
          docker ps | findstr quiz-app-container
          Write-Host "quiz-app is live on http://localhost:3001"
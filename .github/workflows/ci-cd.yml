name: Quiz CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — Build React App
  # ─────────────────────────────────────────────
  build:
    runs-on: self-hosted 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run tests
        run: npm test -- --watchAll=false --passWithNoTests
        continue-on-error: true

      - name: Build project
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: quiz-build
          path: build

  # ─────────────────────────────────────────────
  # JOB 2 — Trigger Jenkins on your PC via ngrok
  #         Jenkins runs locally on your machine
  #         ngrok exposes it to GitHub Actions
  # ─────────────────────────────────────────────
  trigger-jenkins:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Validate Jenkins secrets
        run: |
          MISSING=""
          [ -z "${{ secrets.JENKINS_URL }}"       ] && MISSING="$MISSING JENKINS_URL"
          [ -z "${{ secrets.JENKINS_USER }}"      ] && MISSING="$MISSING JENKINS_USER"
          [ -z "${{ secrets.JENKINS_API_TOKEN }}" ] && MISSING="$MISSING JENKINS_API_TOKEN"
          [ -z "${{ secrets.JENKINS_JOB_TOKEN }}" ] && MISSING="$MISSING JENKINS_JOB_TOKEN"

          if [ -n "$MISSING" ]; then
            echo "❌ Missing GitHub secrets:$MISSING"
            echo "👉 Go to: repo → Settings → Secrets → Actions → New secret"
            exit 1
          fi

          JENKINS_URL="${{ secrets.JENKINS_URL }}"
          echo "✅ All secrets present. Jenkins URL: ${JENKINS_URL%/}"

      - name: Trigger Jenkins deploy job
        run: |
          JENKINS_URL="${{ secrets.JENKINS_URL }}"
          JENKINS_URL="${JENKINS_URL%/}"

          echo "🚀 Triggering Jenkins at: $JENKINS_URL"

          HTTP_STATUS=$(curl \
            --silent \
            --output response.txt \
            --write-out "%{http_code}" \
            --connect-timeout 15 \
            --max-time 30 \
            --user "${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_API_TOKEN }}" \
            --data "token=${{ secrets.JENKINS_JOB_TOKEN }}" \
            "$JENKINS_URL/job/quiz-app-deploy/build?token=${{ secrets.JENKINS_JOB_TOKEN }}")

          CURL_EXIT=$?

          if [ $CURL_EXIT -ne 0 ]; then
            echo "❌ curl failed (exit $CURL_EXIT)"
            case $CURL_EXIT in
              3)  echo "   → Bad URL. Check JENKINS_URL secret (e.g. https://xxxx.ngrok-free.app)" ;;
              6)  echo "   → Cannot resolve host. Is ngrok running on your PC?" ;;
              7)  echo "   → Connection refused. Is Jenkins running? Is ngrok active?" ;;
              28) echo "   → Timed out. ngrok tunnel may be down." ;;
            esac
            exit 1
          fi

          echo "Jenkins HTTP response: $HTTP_STATUS"
          cat response.txt || true

          if [ "$HTTP_STATUS" != "201" ] && [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Jenkins trigger failed (HTTP $HTTP_STATUS)"
            [ "$HTTP_STATUS" = "403" ] && echo "   → 403: Check JENKINS_USER and JENKINS_API_TOKEN"
            [ "$HTTP_STATUS" = "404" ] && echo "   → 404: Job 'quiz-app-deploy' not found in Jenkins"
            exit 1
          fi

          echo "✅ Jenkins job triggered successfully"

      - name: Poll Jenkins for build result
        run: |
          JENKINS_URL="${{ secrets.JENKINS_URL }}"
          JENKINS_URL="${JENKINS_URL%/}"
          AUTH="${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_API_TOKEN }}"
          JENKINS_BASE="$JENKINS_URL/job/quiz-app-deploy"

          echo "⏳ Waiting 15s for Jenkins to start the build..."
          sleep 15

          BUILD_NUMBER=$(curl -sf --user "$AUTH" \
            --connect-timeout 10 \
            "$JENKINS_BASE/lastBuild/buildNumber" 2>/dev/null || echo "")

          if [ -z "$BUILD_NUMBER" ]; then
            echo "❌ Could not get build number from Jenkins."
            echo "   Check: is ngrok still running? Is job named exactly 'quiz-app-deploy'?"
            exit 1
          fi

          echo "📊 Polling Jenkins build #$BUILD_NUMBER..."

          for i in $(seq 1 30); do
            PAYLOAD=$(curl -sf --user "$AUTH" \
              --connect-timeout 10 \
              "$JENKINS_BASE/$BUILD_NUMBER/api/json?tree=result,building" 2>/dev/null || echo "{}")

            RESULT=$(echo "$PAYLOAD" | python3 -c \
              "import sys,json; d=json.load(sys.stdin); print(d.get('result') or ('BUILDING' if d.get('building') else 'UNKNOWN'))" \
              2>/dev/null || echo "UNKNOWN")

            echo "Attempt $i/30 → $RESULT"

            if [ "$RESULT" = "SUCCESS" ]; then
              echo "✅ Jenkins build SUCCEEDED"
              exit 0
            elif [ "$RESULT" = "FAILURE" ] || [ "$RESULT" = "ABORTED" ] || [ "$RESULT" = "UNSTABLE" ]; then
              echo "❌ Jenkins build $RESULT"
              curl -sf --user "$AUTH" \
                "$JENKINS_BASE/$BUILD_NUMBER/consoleText" 2>/dev/null | tail -30 || true
              exit 1
            fi

            sleep 15
          done

          echo "⚠️ Timed out after 7.5 minutes waiting for Jenkins"
          exit 1

  # ─────────────────────────────────────────────
  # JOB 3 — Deploy on your self-hosted Windows PC
  #         Runs only after Jenkins reports success
  # ─────────────────────────────────────────────
  deploy:
    runs-on: self-hosted
    needs: trigger-jenkins

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clean old build folder
        shell: powershell
        run: |
          if (Test-Path build) {
            Remove-Item -Recurse -Force build
            echo "Old build folder removed"
          } else {
            echo "No old build folder found"
          }

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: quiz-build
          path: build

      - name: Verify build folder
        shell: powershell
        run: |
          echo "Build folder contents:"
          ls build
          echo "index.html preview:"
          Get-Content build/index.html -TotalCount 5

      - name: Stop and remove old container
        shell: powershell
        continue-on-error: true
        run: |
          docker stop quiz-app-container
          docker rm   quiz-app-container
          docker rmi  quiz-app

      - name: Build new Docker image
        shell: powershell
        run: docker build --no-cache -t quiz-app .

      - name: Run new container
        shell: powershell
        run: docker run -d -p 3001:80 --name quiz-app-container --restart unless-stopped quiz-app

      - name: Verify container is running
        shell: powershell
        run: |
          docker ps | findstr quiz-app-container
          echo "✅ quiz-app is live on http://localhost:3001"